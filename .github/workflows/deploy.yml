name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - id: pages
        uses: actions/configure-pages@v5

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: kztravelreact/package-lock.json

      - run: npm ci
        working-directory: kztravelreact

      - name: Build for GitHub Pages
        run: npm run build
        working-directory: kztravelreact
        env:
          # Empty when served at domain root; GitHub Pages provides the URL.
          BASE_PATH: ${{ steps.pages.outputs.base_path }}

      - uses: actions/upload-pages-artifact@v3
        with:
          path: kztravelreact/dist

      - id: deployment
        uses: actions/deploy-pages@v4
