itinerary:
  - day: 1
    title: Пристигане в Инсбрук
    description: Среща с групата, проверка на екипировката и приветствен брифинг.
  - day: 2
    title: Гребенът Нордкете
    description: Качване с кабинков лифт и разходка по гребена с гледки към долината.
  - day: 3
    title: Долината Штубай
    description: Целодневен трекинг край алпийски езера и ливади с диви цветя.
  - day: 4
    title: Преход в Италия
    description: Трекинг през прохода Бренер и нощувка в планински refuge.
  - day: 5
    title: Панорама към Доломитите
    description: Класически via ferrata по желание или живописен маршрут през долината.
  - day: 6
    title: Отпътуване
    description: Слизане до Болзано и трансфер до летището.
