name: Приключение в Алпите
description: >
  Трекинг из алпийски ливади и ледникови долини в австрийските и италианските Алпи.
  Умерени маршрути, планински хижи и зашеметяващи панорами за активни пътешественици.
country: austria
duration: 6 дни
category:
  - приключение
  - с-водач
  - лято
