name: Бягство по албанското крайбрежие
description: >
  Открийте залъчена от слънце Албанската ривиера - кристално чисти води, скрити заливи
  и очарователни крайбрежни села. Седем нощи релакс с екскурзии по един от най-добре
  пазените морски тайни на Европа.
country: albania
duration: 7 дни
category:
  - плаж
  - семейно
  - лято
  - с-водач
