itinerary:
  - day: 1
    title: Пристигане в Тирана
    description: Трансфер до хотела, приветствена вечеря и ориентация.
  - day: 2
    title: Крайбрежен път до Дърми
    description: Живописно пътуване по ривиерата със спирки на панорамни гледки.
  - day: 3
    title: Плажен ден в Ксамил
    description: Свободно време на бели пясъчни плажове и по желание лодкова екскурзия.
  - day: 4
    title: Обект на ЮНЕСКО Бутринт
    description: Екскурзия с водач из древните руини и обяд в Саранда.
  - day: 5
    title: Проход Ллогара
    description: Планинска екскурзия със зашеметяващи гледки към морето.
  - day: 6
    title: Свободен ден
    description: Релакс в курорта или разглеждане на местни села в собствено темпо.
  - day: 7
    title: Отпътуване
    description: Закуска и трансфер до летището в Тирана.
