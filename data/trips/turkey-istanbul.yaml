name: Истанбул
description: >
  Четиридневно пътуване в мегаполиса на два континента - Айя София, Синята джамия,
  Гранд базар, круиз по Босфора и колоритните квартали на азиатския бряг.
  Най-пълната ни програма за Истанбул с водач.
country: turkey
duration: 4 дни
