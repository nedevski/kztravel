itinerary:
  - day: 1
    title: Пристигане и Султанахмет
    description: >
      Трансфер и настаняване. Обиколка на Султанахмет - Айя София, Синята джамия
      и Хиподрума с Египетския обелиск.
  - day: 2
    title: Топкапи и Гранд базар
    description: >
      Дворецът Топкапи, съкровищницата и разходка из Гранд базара. Свободно време
      за шопинг и турско кафе.
  - day: 3
    title: Босфор и азиатският бряг
    description: >
      Круиз по Босфора между двата континента. Посещение на квартал Ускюдар
      и Галатската кула с панорамна гледка.
  - day: 4
    title: Специя базар и отпътуване
    description: >
      Сутрешна разходка из Египетския базар. Обяд и трансфер обратно към България.
