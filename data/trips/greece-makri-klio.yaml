name: Почивка в Макри - хотел Klio
description: >
  Шестдневна почивка на брега на Егейско море, на километри от Александруполи.
  Хотел Klio край селото Макри предлага спокойствие сред зехтини и пясъчни заливи -
  идеална база за разходки по крайбрежието на Западна Тракия, антични руини и
  природни резервати.
country: greece
