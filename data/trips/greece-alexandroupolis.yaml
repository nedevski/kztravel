itinerary:
  - day: 1
    title: Пристигане в Макри
    description: >
      Трансфер от Казанлък до хотел Klio край Макри. Настаняване, разходка
      из селото и вечеря с морска кухня на терасата.
  - day: 2
    title: Александруполи
    description: >
      Екскурзия до Александруполи - фарът, крайбрежната алея, рибарското пристанище
      и пазарът с местни продукти. Свободно време за кафе с гледка към Егейско море.
  - day: 3
    title: Плаж и заливи край Макри
    description: >
      Ден на море - плажовете на Макри и Платанитис, по желание лодкова разходка
      до скрити заливи с кристално чиста вода.
  - day: 4
    title: Маронея и древно крайбрежие
    description: >
      Посещение на античната Маронея, театъра и останките от храма на Дионис.
      Дегустация на местно вино и обяд в крайбрежен таверн.
  - day: 5
    title: Отпътуване
    description: >
      Закуска, последна разходка по брега и трансфер обратно към България.
