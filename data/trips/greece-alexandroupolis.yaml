name: Почивка в Александруполи
description: >
  Петдневна почивка на брега на Егейско море край Александруполи. Хотел Klio
  в селото Макри предлага спокойствие сред зехтини и пясъчни заливи -
  идеална база за разходки по крайбрежието на Западна Тракия, антични руини
  и природни резервати.
country: greece
duration: 5 дни
