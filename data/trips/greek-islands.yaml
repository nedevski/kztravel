itinerary:
  - day: 1
    title: Качване на борда в Атина
    description: Качване на ферибота и плаване до Миконос. Вечер на свободно разположение.
  - day: 2
    title: Миконос
    description: Разглеждане на вятърните мелници, Малката Венеция и плажни клубове.
  - day: 3
    title: Наксос
    description: Посещение на Портара и дегустация на местни сирена и ликьор от китрон.
  - day: 4
    title: Санторини
    description: Гледки към калдерата, залез в Ия и дегустация на вино.
  - day: 5
    title: Свободен ден на море
    description: Спирки за плуване и хранене на борда.
  - day: 6
    title: Връщане в Атина
    description: Слизане от борда и прощална вечеря в Плака.
