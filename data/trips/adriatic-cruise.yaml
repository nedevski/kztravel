name: Круиз по Адриатическо море
description: >
  Седмица на борда на бутиков кораб по далматинското крайбрежие - Дубровник, Сплит, Котор
  и скрити адриатически острови. Ол инклузив хранене и ежедневни екскурзии в пристанищата са включени.
