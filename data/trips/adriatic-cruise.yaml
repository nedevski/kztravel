itinerary:
  - day: 1
    title: Качване на борда в Дубровник
    description: Качване на кораба и разглеждане на старите градски стени.
  - day: 2
    title: Корчула
    description: Родното място на Марко Поло и дегустация на вино.
  - day: 3
    title: Хвар
    description: Лавандулови полета и обяд край морето в Стари Град.
  - day: 4
    title: Сплит
    description: Дворецът на Диоклетиан и посещение на местния пазар.
  - day: 5
    title: Котор, Черна гора
    description: Круиз из фиорда и разходка из средновековния стар град.
  - day: 6
    title: На море
    description: Басейн, спа и забавления на борда.
  - day: 7
    title: Слизане от борда
    description: Връщане в пристанището в Дубровник.
