itinerary:
  - day: 1
    title: Велико Търново
    description: >
      Пристигане и настаняване. Обиколка на крепостта Царевец, Асеновата колона
      и пешеходна разходка из стария град с водач.
  - day: 2
    title: Трявна
    description: >
      Екскурзия до Трявна - музея на занаятите, Часовниковата кула и уличките
      с възрожденски къщи. Свободно време за сувенири и обяд.
  - day: 3
    title: Арбанаси и отпътуване
    description: >
      Посещение на Арбанаси с църквите „Св. Архангели“ и „Рождество Христово“.
      Обяд и трансфер обратно.
