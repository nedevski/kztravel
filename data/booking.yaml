title: Как да резервирам
intro: >
  Резервацията е лесна — свържете се с нас по телефон или имейл, изберете дата
  и ще ви изпратим потвърждение с всички детайли.
sections:
  - title: Стъпки за резервация
    items:
      - Изберете екскурзия и желана дата от нашия сайт.
      - Свържете се с нас по телефон или имейл, за да проверим наличност.
      - Заплатете депозит, за да запазим мястото ви.
      - Получавате потвърждение с детайли за пътуването и остатъка от сумата.
  - title: Плащане
    items:
      - Депозит при записване — обикновено 30% от стойността на пътуването.
      - Остатъкът се доплаща до 14 дни преди датата на заминаване.
      - Приемаме банков превод. Реквизитите са на страницата „Контакти“.
  - title: Отказ и промени
    items:
      - При отказ до 30 дни преди заминаване — възстановяване на платената сума с удържане на административна такса.
      - При отказ под 30 дни — сумата не се възстановява, освен ако мястото бъде препродадено.
      - Промяна на дата е възможна при наличност и по договаряне с нас.
  - title: Необходими документи
    items:
      - Валидна лична карта или паспорт (за чуждестранни дестинации).
      - Застраховка за пътуване — препоръчваме сключване преди заминаване.
      - За деца — удостоверение за самоличност или паспорт.
