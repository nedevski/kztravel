<!doctype html>
<html lang="bg">
  <head>
    <script>
      (function () {
        var t = localStorage.getItem('kz-theme');
        if (t === 'dark' || t === 'light') {
          document.documentElement.dataset.theme = t;
        } else {
          var dark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          document.documentElement.dataset.theme = dark ? 'dark' : 'light';
        }
      })();
    </script>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/images/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Каталог с екскурзии и ваканции от туристическа агенция Ваканции Казанлък." />
    <meta property="og:title" content="Ваканции Казанлък" />
    <meta property="og:description" content="Каталог с екскурзии и ваканции от туристическа агенция Ваканции Казанлък." />
    <meta property="og:type" content="website" />
    <title>KZ Travel</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
