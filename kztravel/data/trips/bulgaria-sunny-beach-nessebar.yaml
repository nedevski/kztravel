itinerary:
  - day: 1
    title: Пристигане в Слънчев бряг
    description: >
      Трансфер и настаняване. Свободно време на плажа и вечерна разходка
      по крайбрежната алея.
  - day: 2
    title: Старият Несебър
    description: >
      Екскурзия до архитектурния резерват Несебър - средновековни църкви,
      занаятчийски ателиета и рибарски таверни. Следобед - море в Слънчев бряг.
  - day: 3
    title: Море и отпътуване
    description: >
      Цял ден на плажа по желание. Обяд и следобеден трансфер обратно.
