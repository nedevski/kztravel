      пазарът с подправки. Свободно време за пазаруване и дегустация на локум.
  - day: 2
    title: Капи куле и отпътуване
    description: >
      Посещение на Капи куле и моста на Мехмед II. Обяд с кебапче и трансфер
      обратно към България.
